name: terraform-plan

on:
  workflow_dispatch:
  pull_request:
    branches: ["master"]

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    name: Terraform plan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform/

    env:
      ENVIRONMENT: prod
      TF_CLOUD_PROJECT: ByItsCover_PROD
      TF_WORKSPACE: bic-site-prod
      TF_VAR_build_dir: ..

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Hashicorp - Terraform setup
        uses: hashicorp/setup-terraform@v4
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Testing file path
        run: ls ${{ env.TF_VAR_build_dir }}
          
      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: |
          terraform fmt -recursive
          terraform validate
        continue-on-error: false

      - name: Terraform Plan
        run: terraform plan -var-file=variables/${{ env.ENVIRONMENT }}.tfvars
