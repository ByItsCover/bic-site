name: app-deploy

on:
  workflow_dispatch:
  push:
    branches: ["master"]

permissions:
  id-token: write
  contents: read

jobs:
  check-changes:
    name: Check for Changes
    runs-on: ubuntu-latest

    env:
      APP_BUILD_NAME: bic-site-build

    outputs:
      should_deploy: ${{ steps.filter.outputs.src }}
      build_exists: ${{ steps.artifact-check.outputs.found_artifact }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Paths Filter
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - '**.html'
              - '**.ts'
              - '**.js'
              - '**.json'
              - '**.py'
              - '**.txt'
      
      - name: Check for build artifact
        uses: dawidd6/action-download-artifact@v19
        id: artifact-check
        with:
          name: ${{ env.APP_BUILD_NAME }}
          if_no_artifact_found: warn
          search_artifacts: true

  site-build:
    name: Build and Upload
    runs-on: ubuntu-latest
    needs: check-changes
    if: |
     needs.check-changes.outputs.should_deploy == 'true' ||
     needs.check-changes.outputs.build_exists == 'false'

    env:
      APP_BUILD_NAME: bic-site-build
      BUILD_DIR: dist
      ARTIFACT_RETENTION: 1
      VITE_ENVIRONMENT: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS Credentials for github actions
        uses: aws-actions/configure-aws-credentials@v6
        with:
          audience: sts.amazonaws.com
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE }}
      
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.13
      
      - name: Install Model dependencies
        run: python -m pip install -r build_requirements.txt
      
      - name: Build Model
        run: python download_model.py public/
      
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      
      - name: Install dependencies
        run: npm install
      
      - name: Build
        run: npm run build -- --outDir=${{ env.BUILD_DIR }}
      
      - name: Uploading App build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.APP_BUILD_NAME }}
          path: ${{ env.BUILD_DIR }}
          retention-days: ${{ env.ARTIFACT_RETENTION }}
          overwrite: true

  tf-apply:
    name: Terraform apply
    runs-on: ubuntu-latest
    needs: site-build
    if: ${{ always() && !failure() && !cancelled() }}

    defaults:
      run:
        working-directory: terraform/

    env:
      APP_BUILD_NAME: bic-site-build
      BUILD_DIR: terraform/dist
      ENVIRONMENT: prod
      TF_CLOUD_PROJECT: ByItsCover_PROD
      TF_WORKSPACE: bic-site-prod
      TF_VAR_build_dir: dist

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Downloading Old App build artifacts
        uses: dawidd6/action-download-artifact@v19
        if: needs.site-build.result == 'skipped'
        with:
          name: ${{ env.APP_BUILD_NAME }}
          path: ${{ env.BUILD_DIR }}
          search_artifacts: true

      - name: Downloading New App build artifacts
        uses: dawidd6/action-download-artifact@v19
        if: needs.site-build.result == 'success'
        with:
          name: ${{ env.APP_BUILD_NAME }}
          path: ${{ env.BUILD_DIR }}
          run_id: ${{ github.run_id }}

      - name: Hashicorp - Terraform setup
        uses: hashicorp/setup-terraform@v4
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
      
      - name: Testing Cache
        run: ls
      
      - name: Testing Cache
        run: ls ${{ env.TF_VAR_build_dir }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: |
          terraform fmt -recursive
          terraform validate
        continue-on-error: false

      - name: Terraform Apply
        run: terraform apply -auto-approve -var-file=variables/${{ env.ENVIRONMENT }}.tfvars
