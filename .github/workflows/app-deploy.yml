name: app-deploy

on:
  workflow_dispatch:
  push:
    branches: ["master"]

permissions:
  id-token: write
  contents: read

jobs:
  check-changes:
    name: Check for Changes
    runs-on: ubuntu-latest

    outputs:
      should_deploy: ${{ steps.filter.outputs.src }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Paths Filter
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - '**.html'
              - '**.ts'
              - '**.js'
              - '**.json'
              - 'Dockerfile'

  s3-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.should_deploy == 'true'

    env:
      BUILD_DIR: ./dist
      SITE_BUCKET: bic-site-bucket

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS Credentials for github actions
        uses: aws-actions/configure-aws-credentials@v6
        with:
          audience: sts.amazonaws.com
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE }}
      
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      
      - name: Install dependencies
        run: npm install
      
      - name: Build
        run: npm run build -- --outDir=${{ env.BUILD_DIR }}
      
      - name: S3 deploy
        run: aws s3 sync ${{ env.BUILD_DIR }} s3://${{ env.SITE_BUCKET }} --delete

  tf-apply:
    name: Terraform apply
    runs-on: ubuntu-latest
    needs: s3-deploy
    if: ${{ always() && !failure() && !cancelled() }}

    defaults:
      run:
        working-directory: terraform/

    env:
      ENVIRONMENT: prod
      TF_CLOUD_PROJECT: ByItsCover_PROD
      TF_WORKSPACE: bic-site-prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Hashicorp - Terraform setup
        uses: hashicorp/setup-terraform@v4
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: |
          terraform fmt -recursive
          terraform validate
        continue-on-error: false

      - name: Terraform Apply
        run: terraform apply -auto-approve -var-file=variables/${{ env.ENVIRONMENT }}.tfvars
